services:
  scheduler:
    build:
      dockerfile: Dockerfile
    container_name: scheduler
    command: /server
    ports:
      - "8080:8080"
    env_file: ".env"
    depends_on:
      scheduler_db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    networks:
      - default

  scheduler_db:
    image: postgres:18-alpine
    container_name: scheduler_db
    env_file: ".env"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - default

  migrations:
    image: migrate/migrate:latest
    container_name: migrate
    depends_on:
      scheduler_db:
        condition: service_healthy
    volumes:
      - ./db/migrations:/migrations
    env_file: ".env"
    command: >
      -path=/migrations
      -database=${DB_URL}
      up
    networks:
      - default

volumes:
  postgres_data:

networks:
  default:
